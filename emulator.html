<!DOCTYPE html>
<html lang="fr">
<head>
  <script src="coi-serviceworker.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Émulateur DS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    /* ── Écran de chargement ── */
    #loading-screen {
      position: fixed; inset: 0;
      background: #0a0f1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; z-index: 10;
      transition: opacity 0.5s ease;
    }
    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .ds-logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #e63946, #c1121f);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 900; color: #fff;
      letter-spacing: -2px;
      box-shadow: 0 0 40px rgba(230, 57, 70, 0.4);
      animation: pulse-logo 2s ease-in-out infinite;
    }
    @keyframes pulse-logo {
      0%, 100% { box-shadow: 0 0 30px rgba(230, 57, 70, 0.4); }
      50%       { box-shadow: 0 0 60px rgba(230, 57, 70, 0.7); }
    }

    .loading-title {
      font-size: 1.1rem; font-weight: 700;
      color: #f1f5f9; letter-spacing: .04em;
    }
    .loading-sub {
      font-size: .8rem; color: #64748b;
    }

    /* Barre de progression */
    .progress-wrap {
      width: 220px; height: 4px;
      background: #1e293b; border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 4px;
      width: 0%;
      animation: progress-fill 4s ease-in-out forwards;
    }
    @keyframes progress-fill {
      0%   { width: 0%; }
      40%  { width: 65%; }
      80%  { width: 88%; }
      100% { width: 95%; } /* s'arrête — le jeu complète à 100% */
    }

    /* ── Conteneur du jeu ── */
    #game-container {
      width: 100%; height: 100%;
    }
    #game {
      width: 100%; height: 100%;
    }
  </style>
</head>
<body>

  <!-- Écran de chargement affiché pendant l'init de l'émulateur -->
  <div id="loading-screen">
    <div class="ds-logo">DS</div>
    <p class="loading-title">Chargement de l'émulateur…</p>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <p class="loading-sub" id="loadingStatus">Initialisation du noyau NDS</p>
  </div>

  <div id="game-container">
    <div id="game"></div>
  </div>

  <script>
    // ── Configuration EmulatorJS ──────────────────────────────
    EJS_player      = '#game';
    EJS_core        = 'nds';
    EJS_gameUrl     = 'Roms/Mario Kart DS.nds'; // chemin relatif depuis /ds/
    EJS_pathtodata  = 'https://cdn.emulatorjs.org/latest/data/';
    EJS_language    = 'fr';
    EJS_startOnLoad = true;

    // Met à jour le texte de statut pendant le chargement
    const statusMessages = [
      [500,  'Chargement du WebAssembly…'],
      [1500, 'Initialisation du cœur NDS…'],
      [2800, 'Chargement de la ROM…'],
      [4000, 'Démarrage en cours…'],
    ];
    statusMessages.forEach(([delay, msg]) => {
      setTimeout(() => {
        const el = document.getElementById('loadingStatus');
        if (el) el.textContent = msg;
      }, delay);
    });

    // Masque l'écran de chargement dès que le jeu démarre
    EJS_onGameStart = function() {
      const bar    = document.getElementById('progressBar');
      const screen = document.getElementById('loading-screen');
      if (bar)    bar.style.width = '100%';
      if (screen) {
        setTimeout(() => screen.classList.add('fade-out'), 300);
        setTimeout(() => screen.remove(), 800);
      }
    };
  </script>

  <script src="https://cdn.emulatorjs.org/latest/data/loader.js"></script>

</body>
</html>
